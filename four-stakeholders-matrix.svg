<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 680" font-family="'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&amp;family=Instrument+Serif:ital@0;1&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="880" height="680" fill="#FAF8F4" rx="8"/>

  <!-- Axis labels -->
  <!-- Top: Institution-led -->
  <text x="440" y="38" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8A8A82" letter-spacing="0.12em" text-transform="uppercase">INSTITUTION-LED</text>
  <!-- Bottom: Entrepreneur-led -->
  <text x="440" y="668" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8A8A82" letter-spacing="0.12em">ENTREPRENEUR-LED</text>
  <!-- Left: Opportunistic -->
  <text x="28" y="345" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8A8A82" letter-spacing="0.12em" transform="rotate(-90 28 345)">OPPORTUNISTIC</text>
  <!-- Right: Planned -->
  <text x="856" y="345" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8A8A82" letter-spacing="0.12em" transform="rotate(90 856 345)">PLANNED</text>

  <!-- Grid quadrants -->
  <!-- Top-left: Innovators - warm sand/gold -->
  <rect x="60" y="55" width="380" height="290" rx="6" fill="#E8C9A0" opacity="0.85"/>
  <!-- Top-right: Master Planners - ink/slate -->
  <rect x="444" y="55" width="380" height="290" rx="6" fill="#4A4A45" opacity="0.92"/>
  <!-- Bottom-left: Pioneers - terracotta -->
  <rect x="60" y="349" width="380" height="290" rx="6" fill="#C4704B" opacity="0.9"/>
  <!-- Bottom-right: Local Leaders - forest -->
  <rect x="444" y="349" width="380" height="290" rx="6" fill="#3A5A40" opacity="0.92"/>

  <!-- Divider lines (subtle cross) -->
  <line x1="440" y1="55" x2="440" y2="639" stroke="#FAF8F4" stroke-width="4"/>
  <line x1="60" y1="347" x2="824" y2="347" stroke="#FAF8F4" stroke-width="4"/>

  <!-- ═══ TOP-LEFT: INNOVATORS ═══ -->
  <text x="250" y="92" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="22" fill="#1A1A18" font-weight="400">Innovators</text>
  <!-- traits -->
  <text x="250" y="128" text-anchor="middle" font-size="12.5" fill="#4A3A20" font-weight="400">Resourced</text>
  <text x="250" y="150" text-anchor="middle" font-size="12.5" fill="#4A3A20" font-weight="300">Professionals who spot opportunities</text>
  <text x="250" y="172" text-anchor="middle" font-size="12.5" fill="#4A3A20" font-weight="300">Calculated risk</text>
  <text x="250" y="194" text-anchor="middle" font-size="12.5" fill="#4A3A20" font-weight="300">Re-imagine, incubate space</text>
  <text x="250" y="216" text-anchor="middle" font-size="12.5" fill="#4A3A20" font-weight="300">Connection-building</text>
  <text x="250" y="238" text-anchor="middle" font-size="12.5" fill="#4A3A20" font-weight="300">Trend-aware &amp; experimental</text>
  <text x="250" y="266" text-anchor="middle" font-size="12.5" fill="#4A3A20" font-weight="300" font-style="italic">Failure is a learning opportunity</text>
  <text x="250" y="294" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6A5A3A" letter-spacing="0.05em">Creativity = Remixing ideas</text>

  <!-- ═══ TOP-RIGHT: MASTER PLANNERS ═══ -->
  <text x="634" y="92" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="22" fill="#FAF8F4" font-weight="400">Master Planners</text>
  <text x="634" y="128" text-anchor="middle" font-size="12.5" fill="#D4CFC4" font-weight="400">Strategic plan</text>
  <text x="634" y="150" text-anchor="middle" font-size="12.5" fill="#D4CFC4" font-weight="300">Alignment with other priorities</text>
  <text x="634" y="172" text-anchor="middle" font-size="12.5" fill="#D4CFC4" font-weight="300">Structured &amp; hierarchical</text>
  <text x="634" y="194" text-anchor="middle" font-size="12.5" fill="#D4CFC4" font-weight="300">Defined roles</text>
  <text x="634" y="216" text-anchor="middle" font-size="12.5" fill="#D4CFC4" font-weight="300">Prescriptive &amp; polished</text>
  <text x="634" y="238" text-anchor="middle" font-size="12.5" fill="#D4CFC4" font-weight="300">Replicates what works</text>
  <text x="634" y="266" text-anchor="middle" font-size="12.5" fill="#D4CFC4" font-weight="300" font-style="italic">Failure is worst case</text>
  <text x="634" y="294" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#8A8A82" letter-spacing="0.05em">Creativity = Replicating what works</text>

  <!-- ═══ BOTTOM-LEFT: PIONEERS ═══ -->
  <text x="250" y="386" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="22" fill="#FAF8F4" font-weight="400">Pioneers</text>
  <text x="250" y="422" text-anchor="middle" font-size="12.5" fill="#FAE8DC" font-weight="400">Trend setter &amp; tastemaker</text>
  <text x="250" y="444" text-anchor="middle" font-size="12.5" fill="#FAE8DC" font-weight="300">First-movers</text>
  <text x="250" y="466" text-anchor="middle" font-size="12.5" fill="#FAE8DC" font-weight="300">Risk takers</text>
  <text x="250" y="488" text-anchor="middle" font-size="12.5" fill="#FAE8DC" font-weight="300">Gritty &amp; scrappy</text>
  <text x="250" y="510" text-anchor="middle" font-size="12.5" fill="#FAE8DC" font-weight="300">Steamroller approach</text>
  <text x="250" y="532" text-anchor="middle" font-size="12.5" fill="#FAE8DC" font-weight="300">Success is unexpected</text>
  <text x="250" y="560" text-anchor="middle" font-size="12.5" fill="#FAE8DC" font-weight="300" font-style="italic">An artist&apos;s vision made real</text>
  <text x="250" y="588" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#F0C8B0" letter-spacing="0.05em">Creativity = Vision made real</text>

  <!-- ═══ BOTTOM-RIGHT: LOCAL LEADERS ═══ -->
  <text x="634" y="386" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="22" fill="#FAF8F4" font-weight="400">Local Leaders</text>
  <text x="634" y="422" text-anchor="middle" font-size="12.5" fill="#C8E0CC" font-weight="400">Considered &amp; designed</text>
  <text x="634" y="444" text-anchor="middle" font-size="12.5" fill="#C8E0CC" font-weight="300">Systems approach</text>
  <text x="634" y="466" text-anchor="middle" font-size="12.5" fill="#C8E0CC" font-weight="300">Knows the rules</text>
  <text x="634" y="488" text-anchor="middle" font-size="12.5" fill="#C8E0CC" font-weight="300">Plugged in to community</text>
  <text x="634" y="510" text-anchor="middle" font-size="12.5" fill="#C8E0CC" font-weight="300">Bespoke &amp; authentic</text>
  <text x="634" y="532" text-anchor="middle" font-size="12.5" fill="#C8E0CC" font-weight="300">Go big, or go home</text>
  <text x="634" y="560" text-anchor="middle" font-size="12.5" fill="#C8E0CC" font-weight="300" font-style="italic">Failure has big consequences</text>
  <text x="634" y="588" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#90C098" letter-spacing="0.05em">Creativity = Scaling a vision</text>

  <!-- Corner arrows / axis indicators -->
  <!-- Top arrow -->
  <line x1="440" y1="52" x2="440" y2="48" stroke="#D4CFC4" stroke-width="1.5"/>
  <!-- Bottom arrow -->
  <line x1="440" y1="642" x2="440" y2="646" stroke="#D4CFC4" stroke-width="1.5"/>
  <!-- Left arrow -->
  <line x1="57" y1="347" x2="53" y2="347" stroke="#D4CFC4" stroke-width="1.5"/>
  <!-- Right arrow -->
  <line x1="827" y1="347" x2="831" y2="347" stroke="#D4CFC4" stroke-width="1.5"/>

</svg>
