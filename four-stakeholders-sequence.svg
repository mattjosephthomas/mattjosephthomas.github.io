<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&amp;family=Instrument+Serif:ital@0;1&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#FAF8F4" rx="8"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8A8A82" letter-spacing="0.12em">HOW THE FOUR TYPES WORK TOGETHER</text>

  <!-- ═══ STEP 1: PIONEERS ═══ -->
  <rect x="40" y="60" width="175" height="155" rx="6" fill="#C4704B" opacity="0.9"/>
  <text x="127" y="86" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#F0C8B0" letter-spacing="0.08em">01</text>
  <text x="127" y="110" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="19" fill="#FAF8F4" font-weight="400">Pioneers</text>
  <text x="127" y="134" text-anchor="middle" font-size="11.5" fill="#FAE8DC" font-weight="400">Create</text>
  <text x="127" y="156" text-anchor="middle" font-size="10.5" fill="#FAE8DC" font-weight="300">They build something</text>
  <text x="127" y="171" text-anchor="middle" font-size="10.5" fill="#FAE8DC" font-weight="300">new and prove</text>
  <text x="127" y="186" text-anchor="middle" font-size="10.5" fill="#FAE8DC" font-weight="300">there&apos;s demand.</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="137" x2="243" y2="137" stroke="#D4CFC4" stroke-width="1.5"/>
  <polygon points="243,132 253,137 243,142" fill="#D4CFC4"/>

  <!-- ═══ STEP 2: LOCAL LEADERS ═══ -->
  <rect x="257" y="60" width="175" height="155" rx="6" fill="#3A5A40" opacity="0.92"/>
  <text x="344" y="86" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#90C098" letter-spacing="0.08em">02</text>
  <text x="344" y="110" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="19" fill="#FAF8F4" font-weight="400">Local Leaders</text>
  <text x="344" y="134" text-anchor="middle" font-size="11.5" fill="#C8E0CC" font-weight="400">Legitimize</text>
  <text x="344" y="156" text-anchor="middle" font-size="10.5" fill="#C8E0CC" font-weight="300">Their endorsement turns</text>
  <text x="344" y="171" text-anchor="middle" font-size="10.5" fill="#C8E0CC" font-weight="300">a fringe experiment into</text>
  <text x="344" y="186" text-anchor="middle" font-size="10.5" fill="#C8E0CC" font-weight="300">a community project.</text>

  <!-- Arrow 2→3 -->
  <line x1="437" y1="137" x2="460" y2="137" stroke="#D4CFC4" stroke-width="1.5"/>
  <polygon points="460,132 470,137 460,142" fill="#D4CFC4"/>

  <!-- ═══ STEP 3: INNOVATORS ═══ -->
  <rect x="474" y="60" width="175" height="155" rx="6" fill="#E8C9A0" opacity="0.85"/>
  <text x="561" y="86" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6A5A3A" letter-spacing="0.08em">03</text>
  <text x="561" y="110" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="19" fill="#1A1A18" font-weight="400">Innovators</text>
  <text x="561" y="134" text-anchor="middle" font-size="11.5" fill="#4A3A20" font-weight="400">Commercialize</text>
  <text x="561" y="156" text-anchor="middle" font-size="10.5" fill="#4A3A20" font-weight="300">They take the proven</text>
  <text x="561" y="171" text-anchor="middle" font-size="10.5" fill="#4A3A20" font-weight="300">concept and build</text>
  <text x="561" y="186" text-anchor="middle" font-size="10.5" fill="#4A3A20" font-weight="300">a scalable product.</text>

  <!-- Arrow 3→4 -->
  <line x1="654" y1="137" x2="677" y2="137" stroke="#D4CFC4" stroke-width="1.5"/>
  <polygon points="677,132 687,137 677,142" fill="#D4CFC4"/>

  <!-- ═══ STEP 4: MASTER PLANNERS ═══ -->
  <rect x="691" y="60" width="175" height="155" rx="6" fill="#4A4A45" opacity="0.92"/>
  <text x="778" y="86" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#8A8A82" letter-spacing="0.08em">04</text>
  <text x="778" y="110" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="19" fill="#FAF8F4" font-weight="400">Master Planners</text>
  <text x="778" y="134" text-anchor="middle" font-size="11.5" fill="#D4CFC4" font-weight="400">Coordinate</text>
  <text x="778" y="156" text-anchor="middle" font-size="10.5" fill="#D4CFC4" font-weight="300">They connect the dots</text>
  <text x="778" y="171" text-anchor="middle" font-size="10.5" fill="#D4CFC4" font-weight="300">and ensure growth</text>
  <text x="778" y="186" text-anchor="middle" font-size="10.5" fill="#D4CFC4" font-weight="300">serves the community.</text>

  <!-- ═══ DIVIDER ═══ -->
  <line x1="40" y1="245" x2="840" y2="245" stroke="#D4CFC4" stroke-width="1"/>
  <text x="440" y="272" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8A8A82" letter-spacing="0.12em">WHEN ONE IS MISSING</text>

  <!-- ═══ MISSING ROW ═══ -->
  <!-- No Pioneers -->
  <rect x="40" y="290" width="175" height="68" rx="4" fill="#C4704B" opacity="0.15"/>
  <text x="127" y="313" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="13.5" fill="#C4704B" font-weight="400">No Pioneers</text>
  <text x="127" y="332" text-anchor="middle" font-size="10" fill="#8A8A82" font-weight="300">Nothing new gets created.</text>
  <text x="127" y="347" text-anchor="middle" font-size="10" fill="#8A8A82" font-weight="300">The destination runs on legacy.</text>

  <!-- No Local Leaders -->
  <rect x="257" y="290" width="175" height="68" rx="4" fill="#3A5A40" opacity="0.15"/>
  <text x="344" y="313" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="13.5" fill="#3A5A40" font-weight="400">No Local Leaders</text>
  <text x="344" y="332" text-anchor="middle" font-size="10" fill="#8A8A82" font-weight="300">Community resists tourism.</text>
  <text x="344" y="347" text-anchor="middle" font-size="10" fill="#8A8A82" font-weight="300">Ideas can&apos;t gain support.</text>

  <!-- No Innovators -->
  <rect x="474" y="290" width="175" height="68" rx="4" fill="#E8C9A0" opacity="0.3"/>
  <text x="561" y="313" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="13.5" fill="#8A7040" font-weight="400">No Innovators</text>
  <text x="561" y="332" text-anchor="middle" font-size="10" fill="#8A8A82" font-weight="300">Stays a &quot;hidden gem&quot;</text>
  <text x="561" y="347" text-anchor="middle" font-size="10" fill="#8A8A82" font-weight="300">forever. Never reaches market.</text>

  <!-- No Master Planners -->
  <rect x="691" y="290" width="175" height="68" rx="4" fill="#4A4A45" opacity="0.12"/>
  <text x="778" y="313" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="13.5" fill="#4A4A45" font-weight="400">No Master Planners</text>
  <text x="778" y="332" text-anchor="middle" font-size="10" fill="#8A8A82" font-weight="300">Growth is uncoordinated.</text>
  <text x="778" y="347" text-anchor="middle" font-size="10" fill="#8A8A82" font-weight="300">Infrastructure lags behind.</text>

  <!-- Bottom tagline -->
  <text x="440" y="410" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="16" fill="#1A1A18" font-style="italic">Your job isn&apos;t to be all four. It&apos;s to find which ones are missing.</text>

</svg>
