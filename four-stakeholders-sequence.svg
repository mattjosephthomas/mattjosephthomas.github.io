<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&amp;family=Instrument+Serif:ital@0;1&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#FAF8F4" rx="8"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8A8A82" letter-spacing="0.12em">HOW THE FOUR TYPES WORK TOGETHER</text>

  <!-- ═══ STEP 1: PIONEERS ═══ -->
  <rect x="40" y="70" width="185" height="160" rx="6" fill="#C4704B" opacity="0.9"/>
  <text x="132" y="97" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#F0C8B0" letter-spacing="0.08em">01</text>
  <text x="132" y="122" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="20" fill="#FAF8F4" font-weight="400">Pioneers</text>
  <text x="132" y="148" text-anchor="middle" font-size="11.5" fill="#FAE8DC" font-weight="400">Create</text>
  <text x="132" y="170" text-anchor="middle" font-size="11" fill="#FAE8DC" font-weight="300">They build something</text>
  <text x="132" y="186" text-anchor="middle" font-size="11" fill="#FAE8DC" font-weight="300">new and prove</text>
  <text x="132" y="202" text-anchor="middle" font-size="11" fill="#FAE8DC" font-weight="300">there&apos;s demand.</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="150" x2="258" y2="150" stroke="#D4CFC4" stroke-width="1.5"/>
  <polygon points="258,145 268,150 258,155" fill="#D4CFC4"/>

  <!-- ═══ STEP 2: LOCAL LEADERS ═══ -->
  <rect x="272" y="70" width="185" height="160" rx="6" fill="#3A5A40" opacity="0.92"/>
  <text x="364" y="97" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#90C098" letter-spacing="0.08em">02</text>
  <text x="364" y="122" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="20" fill="#FAF8F4" font-weight="400">Local Leaders</text>
  <text x="364" y="148" text-anchor="middle" font-size="11.5" fill="#C8E0CC" font-weight="400">Legitimize</text>
  <text x="364" y="170" text-anchor="middle" font-size="11" fill="#C8E0CC" font-weight="300">Their endorsement</text>
  <text x="364" y="186" text-anchor="middle" font-size="11" fill="#C8E0CC" font-weight="300">turns a fringe experiment</text>
  <text x="364" y="202" text-anchor="middle" font-size="11" fill="#C8E0CC" font-weight="300">into a community project.</text>

  <!-- Arrow 2→3 -->
  <line x1="462" y1="150" x2="490" y2="150" stroke="#D4CFC4" stroke-width="1.5"/>
  <polygon points="490,145 500,150 490,155" fill="#D4CFC4"/>

  <!-- ═══ STEP 3: INNOVATORS ═══ -->
  <rect x="504" y="70" width="185" height="160" rx="6" fill="#E8C9A0" opacity="0.85"/>
  <text x="596" y="97" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6A5A3A" letter-spacing="0.08em">03</text>
  <text x="596" y="122" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="20" fill="#1A1A18" font-weight="400">Innovators</text>
  <text x="596" y="148" text-anchor="middle" font-size="11.5" fill="#4A3A20" font-weight="400">Commercialize</text>
  <text x="596" y="170" text-anchor="middle" font-size="11" fill="#4A3A20" font-weight="300">They take the proven</text>
  <text x="596" y="186" text-anchor="middle" font-size="11" fill="#4A3A20" font-weight="300">concept and build</text>
  <text x="596" y="202" text-anchor="middle" font-size="11" fill="#4A3A20" font-weight="300">a scalable product.</text>

  <!-- Arrow 3→4 -->
  <line x1="694" y1="150" x2="722" y2="150" stroke="#D4CFC4" stroke-width="1.5"/>
  <polygon points="722,145 732,150 722,155" fill="#D4CFC4"/>

  <!-- ═══ STEP 4: MASTER PLANNERS ═══ -->
  <rect x="736" y="70" width="185" height="160" rx="6" fill="#4A4A45" opacity="0.92"/>
  <text x="828" y="97" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#8A8A82" letter-spacing="0.08em">04</text>
  <text x="828" y="122" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="20" fill="#FAF8F4" font-weight="400">Master Planners</text>
  <text x="828" y="148" text-anchor="middle" font-size="11.5" fill="#D4CFC4" font-weight="400">Coordinate</text>
  <text x="828" y="170" text-anchor="middle" font-size="11" fill="#D4CFC4" font-weight="300">They connect the dots</text>
  <text x="828" y="186" text-anchor="middle" font-size="11" fill="#D4CFC4" font-weight="300">and ensure growth</text>
  <text x="828" y="202" text-anchor="middle" font-size="11" fill="#D4CFC4" font-weight="300">serves the community.</text>

  <!-- ═══ DIVIDER ═══ -->
  <line x1="40" y1="262" x2="840" y2="262" stroke="#D4CFC4" stroke-width="1"/>
  <text x="440" y="290" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8A8A82" letter-spacing="0.12em">WHEN ONE IS MISSING</text>

  <!-- ═══ MISSING TABLE ═══ -->
  <!-- Row 1: No Pioneers -->
  <rect x="40" y="310" width="185" height="70" rx="4" fill="#C4704B" opacity="0.15"/>
  <line x1="80" y1="345" x2="175" y2="345" stroke="#C4704B" stroke-width="1.5" opacity="0.5"/>
  <text x="132" y="331" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="14" fill="#C4704B" font-weight="400">No Pioneers</text>
  <text x="132" y="356" text-anchor="middle" font-size="10.5" fill="#8A8A82" font-weight="300">Nothing new gets created.</text>
  <text x="132" y="371" text-anchor="middle" font-size="10.5" fill="#8A8A82" font-weight="300">The destination runs on legacy.</text>

  <!-- Row 2: No Local Leaders -->
  <rect x="272" y="310" width="185" height="70" rx="4" fill="#3A5A40" opacity="0.15"/>
  <line x1="312" y1="345" x2="407" y2="345" stroke="#3A5A40" stroke-width="1.5" opacity="0.5"/>
  <text x="364" y="331" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="14" fill="#3A5A40" font-weight="400">No Local Leaders</text>
  <text x="364" y="356" text-anchor="middle" font-size="10.5" fill="#8A8A82" font-weight="300">Community resists tourism.</text>
  <text x="364" y="371" text-anchor="middle" font-size="10.5" fill="#8A8A82" font-weight="300">Ideas can&apos;t gain support.</text>

  <!-- Row 3: No Innovators -->
  <rect x="504" y="310" width="185" height="70" rx="4" fill="#E8C9A0" opacity="0.3"/>
  <line x1="544" y1="345" x2="639" y2="345" stroke="#C4A060" stroke-width="1.5" opacity="0.5"/>
  <text x="596" y="331" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="14" fill="#8A7040" font-weight="400">No Innovators</text>
  <text x="596" y="356" text-anchor="middle" font-size="10.5" fill="#8A8A82" font-weight="300">Stays a &quot;hidden gem&quot;</text>
  <text x="596" y="371" text-anchor="middle" font-size="10.5" fill="#8A8A82" font-weight="300">forever. Never reaches market.</text>

  <!-- Row 4: No Master Planners -->
  <rect x="736" y="310" width="185" height="70" rx="4" fill="#4A4A45" opacity="0.12"/>
  <line x1="776" y1="345" x2="871" y2="345" stroke="#4A4A45" stroke-width="1.5" opacity="0.5"/>
  <text x="828" y="331" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="14" fill="#4A4A45" font-weight="400">No Master Planners</text>
  <text x="828" y="356" text-anchor="middle" font-size="10.5" fill="#8A8A82" font-weight="300">Growth is uncoordinated.</text>
  <text x="828" y="371" text-anchor="middle" font-size="10.5" fill="#8A8A82" font-weight="300">Infrastructure lags behind.</text>

  <!-- Bottom tagline -->
  <text x="440" y="430" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="16" fill="#1A1A18" font-style="italic">Your job isn&apos;t to be all four. It&apos;s to find which ones are missing.</text>

</svg>
