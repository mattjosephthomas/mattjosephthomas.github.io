<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" role="img" aria-label="The four stakeholders of destination design: Pioneers, Local Leaders, Innovators, and Master Planners." font-family="'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
  </defs>
  <!-- Background -->
  <rect width="880" height="440" fill="#FAF8F4" rx="8"/>
  <!-- Quadrants -->
  <rect x="40" y="40" width="390" height="170" rx="6" fill="#E8C9A0" opacity="0.85"/>
  <rect x="450" y="40" width="390" height="170" rx="6" fill="#4A4A45" opacity="0.92"/>
  <rect x="40" y="230" width="390" height="170" rx="6" fill="#C4704B" opacity="0.9"/>
  <rect x="450" y="230" width="390" height="170" rx="6" fill="#3A5A40" opacity="0.92"/>
  <!-- Divider cross -->
  <line x1="440" y1="40" x2="440" y2="400" stroke="#FAF8F4" stroke-width="4"/>
  <line x1="40" y1="220" x2="840" y2="220" stroke="#FAF8F4" stroke-width="4"/>
  <!-- Quadrant labels -->
  <text x="235" y="118" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="0.14em" fill="#6A5A3A">01</text>
  <text x="235" y="158" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="38" fill="#1A1A18">Innovators</text>
  <text x="645" y="118" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="0.14em" fill="#8A8A82">02</text>
  <text x="645" y="158" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="38" fill="#FAF8F4">Master Planners</text>
  <text x="235" y="308" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="0.14em" fill="#FAE8DC">03</text>
  <text x="235" y="348" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="38" fill="#FAF8F4">Pioneers</text>
  <text x="645" y="308" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="0.14em" fill="#C9D6CB">04</text>
  <text x="645" y="348" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="38" fill="#FAF8F4">Local Leaders</text>
</svg>
